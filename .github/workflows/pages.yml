name: Deploy MacMarMosaics to GitHub Pages

on:
  # Bei jedem Push auf main automatisch deployen
  push:
    branches: [main]
  # Manuelles Auslösen über den Actions-Tab erlauben
  workflow_dispatch:

# Berechtigungen, die der Workflow für Pages-Deployment braucht
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig — neue Pushes warten,
# Builds in Bearbeitung werden nicht abgebrochen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # checkout@v5 laeuft auf Node 24 (v4 war Node 20, das GitHub auslaeuft).
      - name: Checkout
        uses: actions/checkout@v5

      # Hinweis: configure-pages / upload-pages-artifact / deploy-pages haben
      # (Stand 2026-06) noch keine Node-24-Major-Version. GitHub zwingt sie auf
      # die Node-24-Runtime (Deprecation-Warnung im Log) — der Deploy laeuft
      # weiter. Sobald GitHub neue Majors veroeffentlicht, hier nachziehen.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (nur der site/-Ordner)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

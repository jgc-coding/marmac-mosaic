name: Deploy MarMac-Mosaic to GitHub Pages

on:
  # Bei jedem Push auf main automatisch deployen
  push:
    branches: [main]
  # Manuelles Auslösen über den Actions-Tab erlauben
  workflow_dispatch:

# Berechtigungen, die der Workflow für Pages-Deployment braucht
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig — neue Pushes warten,
# Builds in Bearbeitung werden nicht abgebrochen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (nur der site/-Ordner)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
